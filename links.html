<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gate Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="links.js" defer></script>
</head>
<body class="page page-links">
  <div class="ambient-bg" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
  </div>

  <header class="topbar">
    <a class="brand" href="index.html">GATE</a>
    <nav class="topnav" aria-label="Primary navigation">
      <a class="nav-button" href="index.html">Guide</a>
    </nav>
  </header>

  <main class="layout">
    <section class="hero reveal" style="--delay: 0ms;">
      <p class="eyebrow">Links Hub</p>
      <h1>Open a trusted site or redirect anywhere.</h1>
      <p>All buttons and the custom URL form redirect this same tab.</p>
    </section>

    <section class="panel reveal" style="--delay: 120ms;">
      <h2>Good Sites</h2>
      <div class="sites-grid">
        <button class="site-card" type="button" data-url="https://www.google.com">google.com</button>
        <button class="site-card" type="button" data-url="https://nintendoboi22.github.io">nintendoboi22.github.io</button>
        <button class="site-card" type="button" data-url="https://classroom15xgame.github.io">classroom15xgame.github.io</button>
        <button class="site-card" type="button" data-url="https://azgames.io">azgames.io</button>
        <button class="site-card" type="button" data-url="https://buttertoasty.github.io">buttertoasty.github.io</button>
      </div>
      <p class="hint">Clicking a site redirects here in the same tab.</p>
    </section>

    <section class="panel reveal" style="--delay: 220ms;">
      <h2>Enter Your Own URL</h2>
      <form id="customRedirectForm" class="custom-form" novalidate>
        <label for="customUrl">Site URL</label>
        <div class="form-row">
          <input id="customUrl" name="customUrl" type="text" placeholder="example.com" autocomplete="url" required>
          <button class="go-button" type="submit">Redirect</button>
        </div>
        <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>
</body>
</html>
